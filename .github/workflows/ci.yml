name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS 14 (Apple Silicon / aarch64) ────────────────────────────────────
  build-macos14:
    name: Build & Test — macOS 14 (aarch64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: macos14-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos14-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Install librsvg
        run: brew install librsvg

      - name: Generate .icns
        run: bash scripts/generate_icns.sh

      - name: Package .app bundle
        run: |
          mkdir -p dist
          bash scripts/bundle_macos.sh target/release/shogun-desktop dist

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: shogun-desktop-macos14-app
          path: dist/shogun-desktop-macos.zip
          if-no-files-found: error
          retention-days: 30

  # ── Windows (x86_64-pc-windows-msvc) ─────────────────────────────────────
  build-windows:
    name: Build & Test — Windows (x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: shogun-desktop-windows-x86_64
          path: target/release/shogun-desktop.exe
          if-no-files-found: error
          retention-days: 30

  # ── Lint (clippy + rustfmt) ────────────────────────────────────────────────
  lint:
    name: Lint (clippy + rustfmt)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable with clippy & rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: lint-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: lint-cargo-

      # Plain clippy (no -D warnings): 22 existing warnings would fail CI.
      - name: clippy
        run: cargo clippy

      - name: rustfmt check
        run: cargo fmt --check

  # ── Release: attach binaries to GitHub Release on v* tag ─────────────────
  release:
    name: GitHub Release
    needs: [build-macos14, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: shogun-desktop-macos14-app
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: shogun-desktop-windows-x86_64
          path: dist/

      - name: Rename Windows binary
        run: mv dist/shogun-desktop.exe dist/shogun-desktop-windows-x86_64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/shogun-desktop-macos.zip
            dist/shogun-desktop-windows-x86_64.exe
          generate_release_notes: true
